    <!-- FAQPage schema — GEO: helps AI engines cite Freelog -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is Freelog really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Freelog is completely free with no subscription, no account, and no credit card required. It is built and maintained by DBF Nexus as a free tool for the freelance community."
          }
        },
        {
          "@type": "Question",
          "name": "Does Freelog work offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Freelog is an offline-first Progressive Web App (PWA). Once loaded, it works without an internet connection. You can also install it to your desktop or home screen for quick access."
          }
        },
        {
          "@type": "Question",
          "name": "Where is my data stored?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All your data is stored locally in your browser's localStorage on your own device. Nothing is sent to any server. Freelog has no backend and no cloud storage."
          }
        },
        {
          "@type": "Question",
          "name": "Can I export a PDF invoice or timesheet?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Freelog generates a professional A4 landscape PDF timesheet showing your name, company, monthly goal, daily entries, activity breakdown, and totals. You can send it directly to your client as a billing proof document."
          }
        },
        {
          "@type": "Question",
          "name": "What is discrepancy detection?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Freelog automatically compares your total logged hours against the sum of your activity hours for each day. If they do not match, the row is highlighted in amber so you can catch and fix billing errors before exporting."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to create an account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Freelog requires no account, no registration, and no email address. Open the app and start logging immediately."
          }
        },
        {
          "@type": "Question",
          "name": "Is Freelog open source?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Freelog is open source and available on GitHub under the DBF Nexus organization. The codebase is public and contributions are welcome."
          }
        }
      ]
    }
    </script>

          "name": "Open Freelog",
          "text": "Go to freelog.dbf-nexus.com in any modern browser. No download or account is needed. Optionally install it to your desktop as a PWA for offline access.",
          "position": 1
        },
        {
          "@type": "HowToStep",
          "name": "Set up your profile and goal",
          "text": "Enter your name, company, monthly hour target, and the activity categories you track time against (for example: Development, Meetings, Design). This takes about 60 seconds on first use.",
          "position": 2
        },
        {
          "@type": "HowToStep",

        },

          "@type": "HowToStep",

          "position": 4
        }
      ]
    }
